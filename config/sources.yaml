# config/sources.yaml
#
# Danh sách nguồn tin. Mỗi nguồn có:
#   name        : tên hiển thị
#   group       : ai | tools | market   (nhóm chủ đề, khớp với 3 nhóm trong SKILL.md của Claude)
#   type        : rss | github_atom | gmail
#   url         : với rss/github_atom là link trang chủ (script sẽ tự dò ra feed thật)
#                 với gmail là truy vấn tìm kiếm (from:xxx hoặc label:xxx)
#   feed_url    : (tuỳ chọn) nếu đã biết chắc URL feed, điền vào để bỏ qua bước tự dò
#
# Thêm nguồn mới: copy một khối bên dưới, sửa lại thông tin, không cần đụng vào code.

- name: Superhuman AI
  group: ai
  type: rss
  url: https://www.superhuman.ai/

